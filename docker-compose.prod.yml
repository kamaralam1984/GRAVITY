version: "3.9"

# Production overrides — run as:
# docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

services:
  backend:
    environment:
      ALLOWED_ORIGINS: https://kvltrack.kvlbusinesssolutions.com,http://kvltrack.kvlbusinesssolutions.com
    ports:
      - "127.0.0.1:8010:8000"

  frontend:
    build:
      args:
        NEXT_PUBLIC_API_URL: https://kvltrack.kvlbusinesssolutions.com/api
    ports:
      - "127.0.0.1:3021:3020"
