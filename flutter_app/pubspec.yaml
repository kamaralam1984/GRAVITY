name: kvl_track
description: KVL Track Family Safety Platform
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.7
  dio: ^5.7.0
  web_socket_channel: ^3.0.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.2
  geolocator: ^13.0.2
  permission_handler: ^11.3.1
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  local_auth: ^2.3.0
  lottie: ^3.1.3
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  flutter_secure_storage: ^9.2.2
  path_provider: ^2.1.4
  intl: ^0.19.0
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  share_plus: ^10.0.3
  google_fonts: ^6.2.1
  sensors_plus: ^5.0.1
  connectivity_plus: ^6.1.0
  flutter_background_service: ^5.0.10
  record: ^5.0.5
  camera: ^0.11.0+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - shorebird.yaml

  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Variable.ttf
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Variable.ttf
