version: "3.9"

services:

  # ─────────────────────────────────────────────
  # FastAPI Backend
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./website/backend
      dockerfile: Dockerfile
    container_name: kvltrack-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: sqlite:////app/data/gravity.db
      SECRET_KEY: ${SECRET_KEY:-gravity-super-secret-key-trackalways-2025-change-in-production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 10080
      ALLOWED_ORIGINS: http://localhost:3020,http://localhost:3000,http://frontend:3020
      # AI / LLM
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      COHERE_API_KEY: ${COHERE_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      TOGETHER_API_KEY: ${TOGETHER_API_KEY:-}
      HUGGINGFACE_API_KEY: ${HUGGINGFACE_API_KEY:-}
      # Voice / Speech
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY:-}
      ASSEMBLYAI_API_KEY: ${ASSEMBLYAI_API_KEY:-}
      # Push Notifications
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_SERVER_KEY: ${FIREBASE_SERVER_KEY:-}
      ONESIGNAL_APP_ID: ${ONESIGNAL_APP_ID:-}
      ONESIGNAL_REST_API_KEY: ${ONESIGNAL_REST_API_KEY:-}
      # Payments
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      # Email / SMS
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      FAST2SMS_API_KEY: ${FAST2SMS_API_KEY:-}
      MSG91_API_KEY: ${MSG91_API_KEY:-}
      # Maps
      MAPBOX_ACCESS_TOKEN: ${MAPBOX_ACCESS_TOKEN:-}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      OPENCAGE_API_KEY: ${OPENCAGE_API_KEY:-}
      # OAuth
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    volumes:
      - gravity_db:/app/data
    ports:
      - "8000:8000"
    networks:
      - gravity-net
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ─────────────────────────────────────────────
  # Next.js Frontend
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./website/frontend
      dockerfile: Dockerfile
      args:
        # Browser-side API URL — must be reachable from user's browser
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: kvltrack-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3020
    ports:
      - "3020:3020"
    networks:
      - gravity-net
    depends_on:
      backend:
        condition: service_started

# ─────────────────────────────────────────────
# Named volumes
# ─────────────────────────────────────────────
volumes:
  gravity_db:
    name: kvltrack_sqlite_data

# ─────────────────────────────────────────────
# Internal network
# ─────────────────────────────────────────────
networks:
  gravity-net:
    name: kvltrack-network
    driver: bridge
