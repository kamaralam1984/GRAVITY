version: "3.9"

services:

  # ─────────────────────────────────────────────
  # FastAPI Backend
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./website/backend
      dockerfile: Dockerfile
    container_name: gravity-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: sqlite:////app/data/gravity.db
      SECRET_KEY: ${SECRET_KEY:-gravity-super-secret-key-trackalways-2025-change-in-production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 10080
      ALLOWED_ORIGINS: http://localhost:3020,http://localhost:3000,http://frontend:3020
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - gravity_db:/app/data
    ports:
      - "8000:8000"
    networks:
      - gravity-net
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ─────────────────────────────────────────────
  # Next.js Frontend
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./website/frontend
      dockerfile: Dockerfile
      args:
        # Browser-side API URL — must be reachable from user's browser
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: gravity-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3020
    ports:
      - "3020:3020"
    networks:
      - gravity-net
    depends_on:
      backend:
        condition: service_started

# ─────────────────────────────────────────────
# Named volumes
# ─────────────────────────────────────────────
volumes:
  gravity_db:
    name: gravity_sqlite_data

# ─────────────────────────────────────────────
# Internal network
# ─────────────────────────────────────────────
networks:
  gravity-net:
    name: gravity-network
    driver: bridge
